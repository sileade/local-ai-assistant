name: Deploy to Mac Mini

on:
  push:
    branches: [main]
    paths:
      - 'sclg_ai_console.py'
      - 'sclg_infra_learner.py'
      - 'sclg_telegram_bot.py'
      - 'training/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify syntax
        run: |
          for f in sclg_ai_console.py sclg_infra_learner.py sclg_telegram_bot.py; do
            if [ -f "$f" ]; then
              python3 -c "import py_compile; py_compile.compile('$f', doraise=True)"
              echo "✓ $f syntax OK"
            fi
          done

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy files to bastion
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          FILES=""
          for f in sclg_ai_console.py sclg_infra_learner.py sclg_telegram_bot.py; do
            if [ -f "$f" ]; then
              FILES="$FILES $f"
            fi
          done
          sshpass -e scp -o StrictHostKeyChecking=no -P 2222 \
            $FILES ilea@45.144.43.100:/tmp/
          # Copy training data
          if [ -d "training" ]; then
            sshpass -e ssh -o StrictHostKeyChecking=no -p 2222 ilea@45.144.43.100 "mkdir -p /tmp/sclg_training"
            sshpass -e scp -o StrictHostKeyChecking=no -P 2222 \
              training/*.jsonl training/*.json ilea@45.144.43.100:/tmp/sclg_training/ 2>/dev/null || true
          fi

      - name: Deploy to Mac Mini via bastion
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p 2222 ilea@45.144.43.100 bash -s << 'EOF'
          export SSHPASS='${{ secrets.SSH_PASSWORD }}'

          # Copy all files to Mac Mini
          for f in sclg_ai_console.py sclg_infra_learner.py sclg_telegram_bot.py; do
            if [ -f "/tmp/$f" ]; then
              sshpass -e scp -o StrictHostKeyChecking=no /tmp/$f ilea@172.27.4.255:/tmp/$f
            fi
          done

          # Copy training data to Mac Mini
          if [ -d "/tmp/sclg_training" ]; then
            sshpass -e scp -o StrictHostKeyChecking=no -r /tmp/sclg_training/ ilea@172.27.4.255:/tmp/sclg_training/
          fi

          # Install on Mac Mini
          sshpass -e ssh -o StrictHostKeyChecking=no ilea@172.27.4.255 bash -s << 'MAC'
          for f in sclg_ai_console.py sclg_infra_learner.py sclg_telegram_bot.py; do
            if [ -f "/tmp/$f" ]; then
              cp /tmp/$f /opt/homebrew/bin/$f 2>/dev/null || true
              cp /tmp/$f ~/bin/$f 2>/dev/null || true
              chmod +x /opt/homebrew/bin/$f ~/bin/$f 2>/dev/null || true
              echo "Deployed $f to $(hostname)"
            fi
          done
          # Install training data
          mkdir -p ~/.sclg_ai
          if [ -d "/tmp/sclg_training" ]; then
            cp /tmp/sclg_training/*.jsonl ~/.sclg_ai/ 2>/dev/null || true
            cp /tmp/sclg_training/*.json ~/.sclg_ai/ 2>/dev/null || true
            echo "Training data deployed to ~/.sclg_ai/"
          fi
          echo "sclg-ai: $(python3 /opt/homebrew/bin/sclg_ai_console.py --version 2>&1)"
          echo "infra-learner: $(python3 /opt/homebrew/bin/sclg_infra_learner.py --version 2>&1)"
          MAC
          EOF

      - name: Verify deployment
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p 2222 ilea@45.144.43.100 bash -s << 'EOF'
          export SSHPASS='${{ secrets.SSH_PASSWORD }}'
          sshpass -e ssh -o StrictHostKeyChecking=no ilea@172.27.4.255 bash -s << 'MAC'
          echo "=== Deployed Versions ==="
          python3 /opt/homebrew/bin/sclg_ai_console.py --version 2>&1
          python3 /opt/homebrew/bin/sclg_infra_learner.py --version 2>&1
          echo "=== Training Data ==="
          ls -la ~/.sclg_ai/golden_dataset.jsonl ~/.sclg_ai/test_scenarios.json 2>/dev/null || echo "No training data"
          echo "=== Launchd Services ==="
          launchctl list 2>/dev/null | grep sclg || echo "No sclg services"
          MAC
          EOF
